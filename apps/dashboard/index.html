<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SACRA — Cost Dashboard</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #0d0a08;
        --gold: #c9a84c;
        --p: #f5f0e8;
        --d: #8a7e6e;
        --e: #b84a2e;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: var(--ink);
        color: var(--p);
        font-family: "DM Mono", monospace;
        padding: 2rem;
      }
      h1 {
        font-family: "Playfair Display", serif;
        font-style: italic;
        font-size: 3rem;
        color: var(--gold);
        margin-bottom: 0.5rem;
      }
      .sub {
        font-size: 0.7rem;
        letter-spacing: 0.3em;
        color: var(--d);
        text-transform: uppercase;
        margin-bottom: 3rem;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 1px;
        background: rgba(201, 168, 76, 0.15);
        border: 1px solid rgba(201, 168, 76, 0.15);
        margin-bottom: 3rem;
      }
      .card {
        background: var(--ink);
        padding: 1.5rem;
      }
      .cl {
        font-size: 0.55rem;
        letter-spacing: 0.4em;
        color: var(--d);
        text-transform: uppercase;
        margin-bottom: 0.5rem;
      }
      .cv {
        font-family: "Playfair Display", serif;
        font-size: 2.5rem;
        color: var(--gold);
      }
      .cu {
        font-size: 0.7rem;
        color: var(--d);
        margin-top: 0.25rem;
      }
      h2 {
        font-family: "Playfair Display", serif;
        font-size: 1.4rem;
        color: var(--p);
        margin-bottom: 1rem;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.7rem;
      }
      th {
        padding: 0.5rem 0.8rem;
        background: rgba(201, 168, 76, 0.1);
        color: var(--gold);
        text-align: left;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        font-size: 0.55rem;
        border-bottom: 1px solid rgba(201, 168, 76, 0.2);
      }
      td {
        padding: 0.65rem 0.8rem;
        color: var(--d);
        border-bottom: 1px solid rgba(201, 168, 76, 0.06);
      }
    </style>
  </head>
  <body>
    <h1>SACRA</h1>
    <p class="sub">
      API Cost Transparency Dashboard — Refreshes Every 30 Seconds
    </p>
    <div class="grid">
      <div class="card">
        <div class="cl">This Month</div>
        <div class="cv" id="month">...</div>
        <div class="cu">USD</div>
      </div>
      <div class="card">
        <div class="cl">All Time</div>
        <div class="cv" id="total">...</div>
        <div class="cu">USD</div>
      </div>
      <div class="card">
        <div class="cl">Prayers in DB</div>
        <div class="cv" id="prayers">...</div>
        <div class="cu">indexed</div>
      </div>
      <div class="card">
        <div class="cl">Total Listens</div>
        <div class="cv" id="listens">...</div>
        <div class="cu">all time</div>
      </div>
    </div>
    <h2>Monthly Breakdown</h2>
    <table>
      <thead>
        <tr>
          <th>Month</th>
          <th>Service</th>
          <th>Requests</th>
          <th>Cost (USD)</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr>
          <td colspan="4">Loading...</td>
        </tr>
      </tbody>
    </table>
    <script>
      const API = "https://sacra-production.up.railway.app"; // Update after deploying
      async function load() {
        try {
          const [c, st] = await Promise.all([
            fetch(API + "/api/dashboard/costs").then((r) => r.json()),
            fetch(API + "/api/dashboard/stats").then((r) => r.json()),
          ]);
          document.getElementById("month").textContent =
            "$" + c.totals.this_month_usd;
          document.getElementById("total").textContent =
            "$" + c.totals.all_time_usd;
          document.getElementById("prayers").textContent = (
            st.total_prayers || 0
          ).toLocaleString();
          document.getElementById("listens").textContent = (
            st.total_listens || 0
          ).toLocaleString();
          document.getElementById("tbody").innerHTML = (
            c.monthly_breakdown || []
          ).length
            ? c.monthly_breakdown
                .map(
                  (r) =>
                    `<tr><td>${new Date(r.month).toLocaleDateString("en-US", { year: "numeric", month: "long" })}</td><td>${r.service}</td><td>${(r.request_count || 0).toLocaleString()}</td><td style="color:#c9a84c">$${parseFloat(r.total_cost).toFixed(4)}</td></tr>`,
                )
                .join("")
            : '<tr><td colspan="4" style="font-style:italic;color:#7a6e5e">No data yet — start using the app!</td></tr>';
        } catch (e) {
          document.getElementById("tbody").innerHTML =
            '<tr><td colspan="4" style="color:#b84a2e">Could not load — is the API running?</td></tr>';
        }
      }
      load();
      setInterval(load, 30000);
    </script>
  </body>
</html>
